allowBuilds:
  '@apollo/protobufjs': false
  '@datadog/pprof': false
  '@ffmpeg-installer/linux-x64': false
  '@firebase/util': false
  '@serialport/bindings-cpp': false
  '@vercel/git-hooks': false
  argon2: false
  bcrypt: true
  ejs: false
  es5-ext: false
  esbuild: false
  ffmpeg-static: true
  leveldown: true
  microtime: false
  msgpackr-extract: false
  nice-napi: false
  oracledb: false
  # phantomjs-prebuilt (deprecated) downloads and extracts a binary from GitHub
  # releases in its postinstall, which fails to extract on macOS/Windows and
  # breaks CI. That postinstall only generates lib/location.js, which the trace
  # test does not need. Skip the build so installs are reliable everywhere.
  phantomjs-prebuilt: false
  protobufjs: false
  sharp: false
  unix-dgram: false
  zeromq: false
minimumReleaseAge: 2880
